server {
    listen 80;
    server_name smartagri-demo.duckdns.org;
    # Redirect everything to the HTTPS domain — including requests that arrive
    # via the bare IP, since the cert is only valid for the domain name.
    return 301 https://smartagri-demo.duckdns.org$request_uri;
}

server {
    listen 443 ssl;
    server_name smartagri-demo.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/smartagri-demo.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/smartagri-demo.duckdns.org/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — let React Router handle all frontend routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Main backend (FastAPI, port 8000) ─────────────────────────────────────
    location /auth/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Origin $http_origin;
    }

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Origin $http_origin;
    }

    location /health {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Uploaded listing images (stored on the backend's disk)
    location /uploads/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    # ── ML service (FastAPI, port 8001) ───────────────────────────────────────
    location /predict {
        proxy_pass http://ml:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /cultivation {
        proxy_pass http://ml:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /guidance {
        proxy_pass http://ml:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /meta {
        proxy_pass http://ml:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /weather {
        proxy_pass http://ml:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
