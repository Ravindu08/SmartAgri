server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — let React Router handle all frontend routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Main backend (FastAPI, port 8000) ─────────────────────────────────────
    location /auth/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Origin $http_origin;
    }

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Origin $http_origin;
    }

    # Uploaded listing images (stored on the backend's disk)
    location /uploads/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    # ── ML service (FastAPI, port 8001) ───────────────────────────────────────
    location /predict/ {
        proxy_pass http://ml:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /cultivation/ {
        proxy_pass http://ml:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /guidance/ {
        proxy_pass http://ml:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /meta {
        proxy_pass http://ml:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /weather {
        proxy_pass http://ml:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
