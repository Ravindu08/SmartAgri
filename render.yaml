databases:
  - name: smartagri-db
    databaseName: smartagri
    user: smartagri
    plan: free

services:
  # ── Backend API ──────────────────────────────────────────────────────────────
  - type: web
    name: smartagri-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements-api.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smartagri-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@smartagri.lk
      - key: ADMIN_PASSWORD
        sync: false   # Set in Render dashboard — choose a strong password
      - key: ADMIN_FULL_NAME
        value: System Administrator
      - key: SMARTAGRI_CORS_ORIGINS
        sync: false   # Set to: https://smartagri-frontend.onrender.com (your actual frontend URL)

  # ── ML Service ───────────────────────────────────────────────────────────────
  - type: web
    name: smartagri-ml
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements-ml.txt
    startCommand: uvicorn ml_service.app:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: SMARTAGRI_CORS_ORIGINS
        sync: false   # Set to same value as backend CORS (your frontend URL)

  # ── Frontend Static Site ─────────────────────────────────────────────────────
  - type: web
    name: smartagri-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        sync: false   # Set to: https://smartagri-api.onrender.com (your backend API URL)
      - key: VITE_ML_URL
        sync: false   # Set to: https://smartagri-ml.onrender.com (your ML service URL)
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
