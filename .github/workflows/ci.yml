name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend tests (Python)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt
        working-directory: backend

      - name: Run backend tests
        run: python -m pytest tests/test_main_api.py tests/test_payments.py -v
        working-directory: backend
        env:
          DATABASE_URL: sqlite:///./test_smartagri.db
          SECRET_KEY: ci-test-secret-key-for-github-actions!!
          EMAIL_ENABLED: "false"

  frontend-build:
    name: Frontend build (Node)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Run frontend tests
        run: npm run test
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:8000
          VITE_ML_URL: http://localhost:8001
